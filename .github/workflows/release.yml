name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from addon.xml
        id: version
        run: |
          VERSION=$(grep -oP '<addon\b[^>]*\bversion="\K[^"]+' addon.xml)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Addon version: $VERSION"

      - name: Build zip
        run: |
          bash build.sh
          ADDON_ID="plugin.audio.songloft"
          ZIP_NAME="${ADDON_ID}-${{ steps.version.outputs.version }}.zip"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Extract changelog from addon.xml
        id: changelog
        run: |
          NEWS=$(grep -oP '(?<=<news>)[^<]+' addon.xml | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//')
          echo "news<<EOF" >> $GITHUB_OUTPUT
          echo "$NEWS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Songloft Kodi Plugin ${{ steps.version.outputs.version }}"
          body: |
            ## 更新内容

            ${{ steps.changelog.outputs.news }}

            ## 安装方式

            1. 下载下方 `plugin.audio.songloft-*.zip`
            2. Kodi → 设置 → 插件 → 从 zip 文件安装
            3. 选择下载的 zip 文件完成安装
          files: plugin.audio.songloft-${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: false
